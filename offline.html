<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SENYX — غير متصل</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#02080f;color:#e8ecf5;font-family:'Cairo',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
.logo{width:80px;height:80px;background:linear-gradient(135deg,#b8922a,#d4a843);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-weight:900;font-size:1.2rem;color:#02080f;margin:0 auto 1.5rem}
h1{font-family:'Cinzel',serif;font-size:2rem;color:#fde068;margin-bottom:.5rem}
h2{font-size:1.2rem;color:#e8ecf5;margin-bottom:1rem;font-weight:300}
p{color:#8899bb;font-size:.9rem;line-height:1.9;max-width:400px;margin:0 auto 2rem}
button{background:linear-gradient(135deg,#b8922a,#d4a843);color:#02080f;border:none;padding:.8rem 2rem;border-radius:6px;font-weight:700;font-size:.9rem;cursor:pointer;font-family:'Cairo',sans-serif}
.pulse{animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}
</style>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div>
  <div class="logo">SX</div>
  <h1>SENYX</h1>
  <h2>مدينة الابتكار العالمية الذكية</h2>
  <p class="pulse">📡 لا يوجد اتصال بالإنترنت حالياً<br>تحقق من اتصالك وحاول مجدداً</p>
  <button onclick="location.reload()">🔄 إعادة المحاولة</button>
</div>
</body>
</html>
